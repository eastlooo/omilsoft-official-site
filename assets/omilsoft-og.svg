<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1100" y2="590" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8F5"/>
      <stop offset="0.5" stop-color="#FFF4F8"/>
      <stop offset="1" stop-color="#F8FFF9"/>
    </linearGradient>
    <linearGradient id="panel" x1="718" y1="120" x2="1100" y2="530" gradientUnits="userSpaceOnUse">
      <stop stop-color="#352648"/>
      <stop offset="1" stop-color="#231B36"/>
    </linearGradient>
    <linearGradient id="button" x1="110" y1="452" x2="314" y2="503" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF4F9B"/>
      <stop offset="1" stop-color="#FF2A86"/>
    </linearGradient>
    <radialGradient id="pinkGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(120 122) rotate(37.6874) scale(252.415 202.739)">
      <stop stop-color="#FFADC8" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FFADC8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1036 480) rotate(146.241) scale(246.205 184.028)">
      <stop stop-color="#8DE9D8" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#8DE9D8" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="0" y="0" width="1200" height="630" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="1200" height="630" rx="36" fill="url(#bg)"/>
  <g filter="url(#blur)">
    <ellipse cx="118" cy="116" rx="154" ry="124" fill="url(#pinkGlow)"/>
    <ellipse cx="1044" cy="480" rx="160" ry="118" fill="url(#mintGlow)"/>
  </g>

  <rect x="62" y="54" width="1076" height="522" rx="34" fill="white" fill-opacity="0.46" stroke="white" stroke-opacity="0.7" stroke-width="2"/>
  <rect x="693" y="102" width="381" height="348" rx="28" fill="url(#panel)"/>
  <rect x="717" y="220" width="333" height="90" rx="18" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.08"/>
  <rect x="717" y="330" width="158" height="95" rx="18" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.08"/>
  <rect x="892" y="330" width="158" height="95" rx="18" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.08"/>
  <rect x="717" y="442" width="158" height="84" rx="18" fill="url(#button)" fill-opacity="0.18" stroke="#FF8CBD" stroke-opacity="0.2"/>

  <text x="104" y="112" fill="#8B7B92" font-family="'SF Pro Display', 'Segoe UI', sans-serif" font-size="20" font-weight="700" letter-spacing="0.2em">OMILSOFT</text>
  <text x="104" y="222" fill="#231A35" font-family="'SF Pro Display', 'Segoe UI', sans-serif" font-size="86" font-weight="900">오밀소프트</text>
  <text x="104" y="286" fill="#3A2C4C" font-family="'SF Pro Display', 'Segoe UI', sans-serif" font-size="34" font-weight="800">타닥타닥 운영 주체와 공식 지원·정책 링크 안내</text>
  <text x="104" y="340" fill="#6F6479" font-family="'SF Pro Text', 'Segoe UI', sans-serif" font-size="25" font-weight="500">iOS 운영 중인 타닥타닥의 공식 회사 사이트</text>
  <text x="104" y="376" fill="#6F6479" font-family="'SF Pro Text', 'Segoe UI', sans-serif" font-size="25" font-weight="500">사업자 정보, 지원 채널, 개인정보처리방침, 계정 삭제 안내 제공</text>

  <rect x="104" y="420" width="150" height="42" rx="21" fill="white" fill-opacity="0.72" stroke="#E8DDE8"/>
  <rect x="266" y="420" width="216" height="42" rx="21" fill="white" fill-opacity="0.72" stroke="#E8DDE8"/>
  <rect x="104" y="470" width="216" height="54" rx="27" fill="url(#button)"/>
  <rect x="334" y="470" width="170" height="54" rx="27" fill="white" fill-opacity="0.8" stroke="#E6DCE7"/>

  <text x="130" y="447" fill="#56486A" font-family="'SF Pro Text', 'Segoe UI', sans-serif" font-size="20" font-weight="700">iOS 운영 중</text>
  <text x="290" y="447" fill="#56486A" font-family="'SF Pro Text', 'Segoe UI', sans-serif" font-size="20" font-weight="700">Android 첫 출시 준비 중</text>
  <text x="148" y="505" fill="white" font-family="'SF Pro Text', 'Segoe UI', sans-serif" font-size="22" font-weight="800">iOS App Store로 이동</text>
  <text x="376" y="505" fill="#3B2D4E" font-family="'SF Pro Text', 'Segoe UI', sans-serif" font-size="22" font-weight="800">법적 문서 보기</text>

  <text x="722" y="144" fill="white" fill-opacity="0.48" font-family="'SF Pro Display', 'Segoe UI', sans-serif" font-size="18" font-weight="700" letter-spacing="0.18em">OFFICIAL GUIDE</text>
  <text x="722" y="194" fill="white" font-family="'SF Pro Display', 'Segoe UI', sans-serif" font-size="38" font-weight="800">서비스 소개, 지원, 정책 링크를</text>
  <text x="722" y="236" fill="white" font-family="'SF Pro Display', 'Segoe UI', sans-serif" font-size="38" font-weight="800">같은 기준으로 안내합니다.</text>

  <text x="744" y="250" fill="white" fill-opacity="0.45" font-family="'SF Pro Display', 'Segoe UI', sans-serif" font-size="16" font-weight="700" letter-spacing="0.18em">APP</text>
  <text x="744" y="286" fill="white" font-family="'SF Pro Text', 'Segoe UI', sans-serif" font-size="24" font-weight="800">타닥타닥</text>
  <text x="744" y="314" fill="white" fill-opacity="0.68" font-family="'SF Pro Text', 'Segoe UI', sans-serif" font-size="18" font-weight="500">iOS App Store에서 바로 이동할 수 있는 앱</text>

  <text x="744" y="360" fill="white" fill-opacity="0.45" font-family="'SF Pro Display', 'Segoe UI', sans-serif" font-size="16" font-weight="700" letter-spacing="0.18em">BUSINESS</text>
  <text x="744" y="394" fill="white" font-family="'SF Pro Text', 'Segoe UI', sans-serif" font-size="22" font-weight="800">사업자/운영자 정보</text>

  <text x="916" y="360" fill="white" fill-opacity="0.45" font-family="'SF Pro Display', 'Segoe UI', sans-serif" font-size="16" font-weight="700" letter-spacing="0.18em">SUPPORT</text>
  <text x="916" y="394" fill="white" font-family="'SF Pro Text', 'Segoe UI', sans-serif" font-size="22" font-weight="800">지원 채널</text>

  <text x="744" y="470" fill="white" fill-opacity="0.45" font-family="'SF Pro Display', 'Segoe UI', sans-serif" font-size="16" font-weight="700" letter-spacing="0.18em">DOCUMENTS</text>
  <text x="744" y="502" fill="white" font-family="'SF Pro Text', 'Segoe UI', sans-serif" font-size="22" font-weight="800">개인정보처리방침 · 이용약관</text>
  <text x="744" y="528" fill="white" fill-opacity="0.7" font-family="'SF Pro Text', 'Segoe UI', sans-serif" font-size="18" font-weight="500">계정 삭제, 커뮤니티 정책</text>
